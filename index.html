<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a2a4a" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Agenda Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── Variables ──────────────────────────────────────────────────────── */
:root {
  --blur: 20px;
  --r: 18px;
  --font: 'Figtree', sans-serif;
  --font-d: 'Playfair Display', serif;
  --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Light */
  --body-bg: linear-gradient(145deg,#c8ddf7 0%,#ddeaf8 40%,#e4eef8 70%,#c0d5ef 100%);
  --glass: rgba(255,255,255,0.52);
  --glass-b: rgba(255,255,255,0.75);
  --glass-s: 0 8px 32px rgba(60,100,180,0.13),0 2px 8px rgba(60,100,180,0.07);
  --glass-inner: inset 0 1px 0 rgba(255,255,255,0.9);
  --text: #0c1c38;
  --text2: #3d5a80;
  --text3: #8aa4c0;
  --accent: #2563eb;
  --accent-g: rgba(37,99,235,0.22);
  --hover: rgba(37,99,235,0.06);
  --today-bg: rgba(37,99,235,0.11);
  --today-ring: rgba(37,99,235,0.45);
  --modal-bg: rgba(240,248,255,0.88);
  --inp: rgba(255,255,255,0.65);
  --inp-b: rgba(37,99,235,0.18);
  --btn2: rgba(37,99,235,0.07);
  --wd: rgba(255,255,255,0.28);
  --player-bg: rgba(255,255,255,0.6);
  --player-b: rgba(255,255,255,0.85);
}
[data-theme=dark] {
  --body-bg: linear-gradient(145deg,#04090f 0%,#070e1c 40%,#080f1e 70%,#050c18 100%);
  --glass: rgba(8,16,35,0.58);
  --glass-b: rgba(70,120,240,0.14);
  --glass-s: 0 8px 32px rgba(0,5,20,0.55),0 2px 8px rgba(0,5,20,0.3);
  --glass-inner: inset 0 1px 0 rgba(100,155,255,0.07);
  --text: #e2eeff;
  --text2: #7aa0cc;
  --text3: #3d5a7a;
  --accent: #4d8fff;
  --accent-g: rgba(77,143,255,0.28);
  --hover: rgba(77,143,255,0.07);
  --today-bg: rgba(77,143,255,0.14);
  --today-ring: rgba(77,143,255,0.55);
  --modal-bg: rgba(5,12,28,0.92);
  --inp: rgba(255,255,255,0.04);
  --inp-b: rgba(77,143,255,0.22);
  --btn2: rgba(77,143,255,0.1);
  --wd: rgba(77,143,255,0.06);
  --player-bg: rgba(8,16,35,0.65);
  --player-b: rgba(70,130,255,0.18);
}

/* ── Reset ──────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;scroll-behavior:smooth}
body{
  min-height:100%;height:100vh;
  font-family:var(--font);
  background:var(--body-bg);
  color:var(--text);
  overflow:hidden;
  transition:background var(--tr),color var(--tr);
  user-select:none;
  -webkit-user-select:none;
}

/* ── Orbs ───────────────────────────────────────────────────────────── */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.7}
.o1{width:60vw;height:60vw;top:-15vw;left:-10vw;
  background:radial-gradient(circle,rgba(37,99,235,.18),transparent 70%)}
.o2{width:50vw;height:50vw;bottom:-10vw;right:-8vw;
  background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%)}
.o3{width:35vw;height:35vw;top:40%;left:55%;
  background:radial-gradient(circle,rgba(20,184,166,.09),transparent 70%)}
[data-theme=dark] .o1{background:radial-gradient(circle,rgba(77,143,255,.22),transparent 70%)}
[data-theme=dark] .o2{background:radial-gradient(circle,rgba(167,139,250,.16),transparent 70%)}
[data-theme=dark] .o3{background:radial-gradient(circle,rgba(45,212,191,.11),transparent 70%)}

/* ── Layout ─────────────────────────────────────────────────────────── */
#app{
  position:relative;z-index:1;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  padding:12px 10px 0;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  gap:8px;
  max-width:480px;
  margin:0 auto;
}

/* ── Glass mixin ─────────────────────────────────────────────────────── */
.g{
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(180%);
  border:1px solid var(--glass-b);
  border-radius:var(--r);
  box-shadow:var(--glass-s),var(--glass-inner);
  transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);
}

/* ── Header ─────────────────────────────────────────────────────────── */
header{
  padding:12px 16px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.logo{
  font-family:var(--font-d);
  font-size:1.3rem;font-weight:500;
  color:var(--text);letter-spacing:-.02em;
  margin-right:auto;
}
.logo em{color:var(--accent);font-style:normal}

.nav-pill{
  display:flex;align-items:center;gap:2px;
  background:var(--glass);
  backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));
  border:1px solid var(--glass-b);
  border-radius:12px;padding:3px;
}
#month-lbl{
  min-width:110px;text-align:center;
  font-weight:700;font-size:.78rem;
  color:var(--text);letter-spacing:.01em;
}
.ic{
  width:34px;height:34px;border:none;
  background:transparent;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);
  transition:all .2s;font-size:14px;
}
.ic:hover,.ic:active{background:var(--hover);color:var(--accent)}
.ic svg{width:15px;height:15px;stroke-width:2.2}

.btn-add{
  display:flex;align-items:center;gap:5px;
  padding:0 13px;height:34px;
  background:var(--accent);color:#fff;
  border:none;border-radius:10px;
  font-family:var(--font);font-size:.8rem;font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 14px var(--accent-g);
  transition:all .2s;
}
.btn-add:active{transform:scale(.96)}
.btn-add svg{width:13px;height:13px;stroke-width:2.5}

.ic.theme-ic{
  background:var(--glass);
  backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));
  border:1px solid var(--glass-b);
  border-radius:10px;
}

/* ── Calendar ───────────────────────────────────────────────────────── */
#cal{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.wdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;padding:10px 10px 5px;flex-shrink:0;
}
.wd{
  text-align:center;
  font-size:.62rem;font-weight:800;
  letter-spacing:.09em;text-transform:uppercase;
  color:var(--text3);padding:5px 0;
  background:var(--wd);border-radius:7px;
}
.wd.we{color:var(--accent)}

.days{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;padding:3px 10px 10px;
  flex:1;overflow-y:auto;
  scrollbar-width:none;
}
.days::-webkit-scrollbar{display:none}

.dc{
  border-radius:11px;padding:5px 5px 4px;
  cursor:pointer;
  transition:background .15s,border-color .15s;
  position:relative;min-height:60px;
  display:flex;flex-direction:column;gap:2px;
  border:1px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.dc:active{transform:scale(.97)}
.dc.om .dn{opacity:.3}
.dc.tod{background:var(--today-bg);border-color:var(--today-ring)}
.dc:not(.tod):hover{background:var(--hover);border-color:var(--glass-b)}

.dn{
  font-size:.78rem;font-weight:700;
  color:var(--text2);
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all .2s;flex-shrink:0;
}
.tod .dn{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-g)}
.dc.we .dn{color:var(--accent)}
.dc.tod.we .dn{color:#fff}

/* Mobile event dots */
.ev-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
.ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── Player ─────────────────────────────────────────────────────────── */
#player-wrap{
  flex-shrink:0;
  padding-bottom:calc(10px + var(--safe-bottom));
}
#player{
  background:var(--player-bg);
  backdrop-filter:blur(var(--blur)) saturate(200%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(200%);
  border:1px solid var(--player-b);
  border-radius:var(--r);
  box-shadow:var(--glass-s);
  overflow:hidden;
  transition:all .35s var(--tr);
}
.player-bar{
  display:flex;align-items:center;
  padding:10px 14px;gap:10px;cursor:pointer;
}
.player-icon{
  width:36px;height:36px;flex-shrink:0;
  background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px var(--accent-g);
}
.player-icon svg{width:16px;height:16px;stroke:white;stroke-width:2}
.player-info{flex:1;min-width:0}
.player-title{
  font-size:.8rem;font-weight:700;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-sub{
  font-size:.65rem;color:var(--text3);margin-top:1px;
  font-weight:500;
}
.player-controls{display:flex;align-items:center;gap:4px}
.p-btn{
  width:32px;height:32px;
  border:none;border-radius:9px;
  background:var(--btn2);cursor:pointer;
  color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.p-btn:active{transform:scale(.9)}
.p-btn svg{width:14px;height:14px;stroke-width:2.2}
.p-btn.play-btn{
  background:var(--accent);color:#fff;width:36px;height:36px;border-radius:11px;
  box-shadow:0 3px 10px var(--accent-g);
}
.p-btn.expand-btn{color:var(--text3)}
.expand-arrow{transition:transform .3s;display:block}
#player.expanded .expand-arrow{transform:rotate(180deg)}

.player-expanded{
  max-height:0;overflow:hidden;
  transition:max-height .35s cubic-bezier(0.4,0,0.2,1);
  padding:0 14px;
}
#player.expanded .player-expanded{max-height:220px}

.player-exp-inner{padding-bottom:14px;display:flex;flex-direction:column;gap:10px}

/* Animated wave when playing */
.wave{display:flex;align-items:flex-end;gap:2px;height:16px}
.wave span{
  width:3px;border-radius:3px;
  background:var(--accent);opacity:.7;
  animation:wave-bar 1s ease-in-out infinite;
  transform-origin:bottom;
}
.wave span:nth-child(1){height:6px;animation-delay:0s}
.wave span:nth-child(2){height:12px;animation-delay:.1s}
.wave span:nth-child(3){height:8px;animation-delay:.2s}
.wave span:nth-child(4){height:14px;animation-delay:.05s}
.wave span:nth-child(5){height:5px;animation-delay:.15s}
@keyframes wave-bar{
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(.3)}
}
.wave.paused span{animation-play-state:paused}

/* URL input */
.url-wrap{position:relative}
.url-inp{
  width:100%;padding:9px 12px;
  background:var(--inp);border:1px solid var(--inp-b);
  border-radius:10px;
  font-family:var(--font);font-size:.8rem;color:var(--text);
  outline:none;transition:all .2s;
}
.url-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g)}
.url-inp::placeholder{color:var(--text3)}
.url-lbl{
  font-size:.62rem;font-weight:800;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:block;
}

/* Presets */
.presets{display:flex;gap:5px;flex-wrap:wrap}
.preset-btn{
  padding:5px 10px;border-radius:8px;
  border:1px solid var(--inp-b);background:var(--inp);
  color:var(--text2);font-family:var(--font);font-size:.68rem;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.preset-btn:hover,.preset-btn.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 2px 8px var(--accent-g);
}

/* Volume */
.vol-row{display:flex;align-items:center;gap:8px}
.vol-row svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
input[type=range]{
  flex:1;height:4px;
  -webkit-appearance:none;appearance:none;
  background:var(--inp-b);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--accent);box-shadow:0 2px 6px var(--accent-g);
  cursor:pointer;transition:transform .15s;
}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}

/* ── Modal ──────────────────────────────────────────────────────────── */
.ov{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:calc(10px + var(--safe-bottom));
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.ov.open{opacity:1;pointer-events:all}

.modal{
  background:var(--modal-bg);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border:1px solid var(--glass-b);
  border-radius:22px 22px var(--r) var(--r);
  box-shadow:0 -4px 40px rgba(0,0,0,.18);
  width:100%;max-width:480px;
  padding:20px 20px;
  max-height:90vh;overflow-y:auto;
  scrollbar-width:none;
  transform:translateY(30px);
  transition:transform .3s cubic-bezier(0.4,0,0.2,1);
}
.modal::-webkit-scrollbar{display:none}
.ov.open .modal{transform:translateY(0)}

/* Modal drag handle */
.modal::before{
  content:'';display:block;
  width:36px;height:4px;border-radius:2px;
  background:var(--text3);opacity:.4;
  margin:0 auto 18px;
}

.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mt{font-family:var(--font-d);font-size:1.15rem;font-weight:500;color:var(--text)}
.mc{
  width:30px;height:30px;border:none;
  background:var(--btn2);border-radius:8px;
  cursor:pointer;color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .2s;
}
.mc:hover{background:rgba(220,38,38,.12);color:#ef4444}

.fg{margin-bottom:12px}
.fl{
  display:block;font-size:.62rem;font-weight:800;
  letter-spacing:.09em;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;
}
.fi,.fsl,.fta{
  width:100%;padding:9px 12px;
  background:var(--inp);border:1px solid var(--inp-b);
  border-radius:10px;font-family:var(--font);font-size:.85rem;
  color:var(--text);outline:none;transition:all .2s;
  -webkit-appearance:none;
}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g)}
.fta{resize:vertical;min-height:64px}
.fsl option{background:#0d1628;color:#e2eeff}

.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fr .fg{margin:0}

/* Type selector */
.ts{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.to{
  padding:8px 3px;border-radius:10px;
  border:1.5px solid transparent;cursor:pointer;
  text-align:center;font-size:.66rem;font-weight:700;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.to .ti{font-size:1.1rem}
.to[data-t=clase]{color:#2563eb;background:rgba(37,99,235,.07)}
.to[data-t=tarea]{color:#dc2626;background:rgba(220,38,38,.07)}
.to[data-t=reunion]{color:#059669;background:rgba(16,185,129,.07)}
.to[data-t=recordatorio]{color:#d97706;background:rgba(245,158,11,.07)}
[data-theme=dark] .to[data-t=clase]{color:#60a5fa;background:rgba(77,143,255,.1)}
[data-theme=dark] .to[data-t=tarea]{color:#f87171;background:rgba(248,113,113,.1)}
[data-theme=dark] .to[data-t=reunion]{color:#34d399;background:rgba(52,211,153,.1)}
[data-theme=dark] .to[data-t=recordatorio]{color:#fbbf24;background:rgba(251,191,36,.1)}
.to.sel{border-color:currentColor}

/* Notify toggle */
.nr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:var(--inp);border:1px solid var(--inp-b);border-radius:10px;
}
.nl{font-size:.8rem;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:7px}
.nl svg{width:13px;height:13px;color:var(--accent)}
.tg{position:relative;width:38px;height:20px;cursor:pointer;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tgt{position:absolute;inset:0;background:var(--text3);border-radius:10px;transition:.2s}
.tg input:checked + .tgt{background:var(--accent)}
.tgk{
  position:absolute;top:2px;left:2px;
  width:16px;height:16px;background:#fff;border-radius:50%;
  transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.25);
}
.tg input:checked ~ .tgk{left:20px}

.mf{display:flex;gap:7px;margin-top:16px}
.bs{
  flex:1;padding:11px;
  background:var(--accent);color:#fff;
  border:none;border-radius:11px;
  font-family:var(--font);font-size:.85rem;font-weight:700;
  cursor:pointer;box-shadow:0 4px 14px var(--accent-g);transition:all .2s;
}
.bs:active{transform:scale(.97)}
.bcl{
  padding:11px 14px;
  background:var(--btn2);color:var(--text2);
  border:1px solid var(--glass-b);border-radius:11px;
  font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;
}

/* Day modal list */
.edl{display:flex;flex-direction:column;gap:7px;max-height:55vh;overflow-y:auto;scrollbar-width:none}
.edl::-webkit-scrollbar{display:none}
.edi{
  padding:10px 12px;border-radius:11px;
  display:flex;align-items:flex-start;gap:9px;
  background:var(--inp);border:1px solid var(--inp-b);
}
.edd{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.edif{flex:1;min-width:0}
.edn{font-size:.85rem;font-weight:700;color:var(--text)}
.edm{font-size:.67rem;color:var(--text3);margin-top:1px;font-weight:500}
.edc{font-size:.75rem;color:var(--text2);margin-top:3px}
.del-btn{
  background:none;border:none;color:var(--text3);
  cursor:pointer;padding:2px 5px;border-radius:6px;font-size:13px;transition:all .15s;
}
.del-btn:active{background:rgba(220,38,38,.12);color:#ef4444}
.empty-day{
  text-align:center;color:var(--text3);padding:28px;font-size:.82rem;line-height:1.6;
}

/* ── Toast ──────────────────────────────────────────────────────────── */
#tc{
  position:fixed;bottom:100px;
  left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;
}
.toast{
  padding:9px 16px;border-radius:12px;
  font-size:.78rem;font-weight:600;color:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  animation:tIn .3s ease;white-space:nowrap;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.ts-ok{background:rgba(5,150,105,.9)}
.ts-info{background:rgba(37,99,235,.9)}
.ts-w{background:rgba(217,119,6,.9)}
.ts-err{background:rgba(220,38,38,.9)}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Animations ─────────────────────────────────────────────────────── */
#app{animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div id="app">

  <!-- Header -->
  <header class="g">
    <div class="logo">Agenda<em>.</em></div>
    <div class="nav-pill">
      <button class="ic" onclick="chM(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div id="month-lbl"></div>
      <button class="ic" onclick="chM(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="btn-add" onclick="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="ic theme-ic" onclick="toggleTheme()" id="thm-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </header>

  <!-- Calendar -->
  <div id="cal" class="g">
    <div class="wdays">
      <div class="wd we">Dom</div><div class="wd">Lun</div><div class="wd">Mar</div>
      <div class="wd">Mié</div><div class="wd">Jue</div><div class="wd">Vie</div>
      <div class="wd we">Sáb</div>
    </div>
    <div class="days" id="days"></div>
  </div>

  <!-- Music Player -->
  <div id="player-wrap">
    <div id="player" class="g">
      <div class="player-bar" onclick="togglePlayer()">
        <div class="player-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="player-info">
          <div class="player-title" id="p-title">Música de fondo</div>
          <div class="player-sub" id="p-sub">
            <div class="wave paused" id="p-wave">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <div class="player-controls">
          <button class="p-btn play-btn" id="play-btn" onclick="event.stopPropagation();togglePlay()" title="Play/Pause">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <button class="p-btn expand-btn" onclick="event.stopPropagation();togglePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="expand-arrow"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
        </div>
      </div>
      <div class="player-expanded">
        <div class="player-exp-inner">
          <div>
            <span class="url-lbl">URL del stream de audio</span>
            <input class="url-inp" id="stream-url" type="url"
              placeholder="https://… (stream MP3, AAC, OGG)"
              oninput="onUrlInput()" onblur="loadUrl()">
          </div>
          <div>
            <span class="url-lbl">Estaciones rápidas</span>
            <div class="presets" id="presets"></div>
          </div>
          <div class="vol-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--text3)"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input type="range" id="vol" min="0" max="100" value="70" oninput="setVol(this.value)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--text3)"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Event Modal -->
<div class="ov" id="ov-add">
  <div class="modal">
    <div class="mh">
      <div class="mt">Nuevo evento</div>
      <button class="mc" onclick="closeOv('ov-add')">✕</button>
    </div>
    <div class="fg">
      <span class="fl">Tipo</span>
      <div class="ts" id="ts">
        <div class="to sel" data-t="clase" onclick="selT('clase')"><span class="ti">📚</span>Clase</div>
        <div class="to" data-t="tarea" onclick="selT('tarea')"><span class="ti">✏️</span>Tarea</div>
        <div class="to" data-t="reunion" onclick="selT('reunion')"><span class="ti">👥</span>Reunión</div>
        <div class="to" data-t="recordatorio" onclick="selT('recordatorio')"><span class="ti">🔔</span>Aviso</div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Título</label>
      <input class="fi" id="ev-t" type="text" placeholder="Ej: Matemáticas II, Parcial, Reunión…">
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Fecha</label><input class="fi" id="ev-d" type="date"></div>
      <div class="fg"><label class="fl">Hora</label><input class="fi" id="ev-h" type="time"></div>
    </div>
    <div class="fg">
      <label class="fl">Descripción</label>
      <textarea class="fta" id="ev-desc" placeholder="Notas adicionales…"></textarea>
    </div>
    <div class="fg">
      <label class="fl">Recordatorio</label>
      <select class="fsl" id="ev-rem">
        <option value="">Sin recordatorio</option>
        <option value="0">Al momento</option>
        <option value="5">5 min antes</option>
        <option value="15" selected>15 min antes</option>
        <option value="30">30 min antes</option>
        <option value="60">1 hora antes</option>
        <option value="1440">1 día antes</option>
      </select>
    </div>
    <div class="fg" style="margin-bottom:0">
      <div class="nr">
        <label class="nl" for="ev-n">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Notificación en dispositivo
        </label>
        <label class="tg">
          <input type="checkbox" id="ev-n" checked>
          <div class="tgt"></div><div class="tgk"></div>
        </label>
      </div>
    </div>
    <div class="mf">
      <button class="bcl" onclick="closeOv('ov-add')">Cancelar</button>
      <button class="bs" onclick="saveEv()">Guardar</button>
    </div>
  </div>
</div>

<!-- Day Modal -->
<div class="ov" id="ov-day">
  <div class="modal">
    <div class="mh">
      <div class="mt" id="day-title">Eventos</div>
      <button class="mc" onclick="closeOv('ov-day')">✕</button>
    </div>
    <div class="edl" id="day-list"></div>
    <div class="mf">
      <button class="bcl" onclick="closeOv('ov-day')">Cerrar</button>
      <button class="bs" onclick="addFromDay()">+ Agregar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="tc"></div>

<!-- Hidden audio -->
<audio id="audio" preload="none"></audio>

<script>
// ── State ──────────────────────────────────────────────────────────────
const today = new Date();
let cy = today.getFullYear(), cm = today.getMonth();
let events = {}, selType = 'clase', dayDate = null, playerOpen = false;
let isPlaying = false, swReg = null;
let activePreset = null;

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const TYPE_LBL = {clase:'Clase',tarea:'Tarea',reunion:'Reunión',recordatorio:'Aviso'};
const TYPE_COL = {
  clase:['#2563eb','#60a5fa'],
  tarea:['#dc2626','#f87171'],
  reunion:['#059669','#34d399'],
  recordatorio:['#d97706','#fbbf24']
};

const PRESETS = [
  { name:'☕ Lofi Café',    url:'https://streams.ilovemusic.de/iloveradio17.mp3' },
  { name:'🌧 Rain & Lofi', url:'https://lofi.stream.laut.fm/lofi' },
  { name:'🌙 Chillhop',   url:'https://streams.ilovemusic.de/iloveradio2.mp3' },
  { name:'🎹 Jazz',        url:'https://streams.ilovemusic.de/iloveradio8.mp3' },
];

// ── Init ───────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('agenda_ev');
  if (saved) try { events = JSON.parse(saved); } catch(e){}

  const theme = localStorage.getItem('agenda_theme') || 'dark';
  document.documentElement.dataset.theme = theme;
  setThemeIcon(theme);

  renderCal();
  buildPresets();
  setupAudio();
  registerSW();
  requestNotif();
  schedAll();

  // Restore last stream
  const lastUrl = localStorage.getItem('agenda_stream');
  if (lastUrl) {
    document.getElementById('stream-url').value = lastUrl;
    loadUrl(false);
  }
}

// ── Service Worker ─────────────────────────────────────────────────────
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(r => { swReg = r; })
      .catch(()=>{});
  }
}

// ── Calendar ───────────────────────────────────────────────────────────
function renderCal() {
  document.getElementById('month-lbl').textContent = `${MONTHS[cm].slice(0,3)} ${cy}`;
  const grid = document.getElementById('days');
  grid.innerHTML = '';

  const first = new Date(cy, cm, 1).getDay();
  const total = new Date(cy, cm+1, 0).getDate();
  const prevTotal = new Date(cy, cm, 0).getDate();

  for (let i = first-1; i >= 0; i--) appendDay(grid, cy, cm-1, prevTotal-i, true);
  for (let d = 1; d <= total; d++) appendDay(grid, cy, cm, d, false);
  const cells = grid.children.length;
  const rem = cells % 7 === 0 ? 0 : 7 - cells % 7;
  for (let d = 1; d <= rem; d++) appendDay(grid, cy, cm+1, d, true);
}

function appendDay(grid, y, m, d, other) {
  const date = new Date(y, m, d);
  const yr = date.getFullYear(), mo = date.getMonth(), dy = date.getDate();
  const key = K(yr, mo, dy);
  const isToday = yr===today.getFullYear() && mo===today.getMonth() && dy===today.getDate();
  const dow = date.getDay();
  const we = dow===0||dow===6;
  const dark = document.documentElement.dataset.theme === 'dark';

  const cell = document.createElement('div');
  let cls = 'dc';
  if (other) cls += ' om';
  if (isToday) cls += ' tod';
  if (we) cls += ' we';
  cell.className = cls;
  cell.onclick = () => openDay(yr, mo, dy);

  const num = document.createElement('div');
  num.className = 'dn';
  num.textContent = dy;
  cell.appendChild(num);

  const dayEvs = events[key] || [];
  if (dayEvs.length > 0) {
    const dotsWrap = document.createElement('div');
    dotsWrap.className = 'ev-dots';
    dayEvs.slice(0, 4).forEach(ev => {
      const dot = document.createElement('span');
      dot.className = 'ev-dot';
      const col = TYPE_COL[ev.type] || TYPE_COL.clase;
      dot.style.background = dark ? col[1] : col[0];
      dotsWrap.appendChild(dot);
    });
    cell.appendChild(dotsWrap);
  }

  grid.appendChild(cell);
}

function chM(dir) {
  cm += dir;
  if (cm > 11) { cm = 0; cy++; }
  if (cm < 0) { cm = 11; cy--; }
  renderCal();
}

// ── Add Event ──────────────────────────────────────────────────────────
function openAdd(prefill) {
  const d = prefill || new Date();
  document.getElementById('ev-t').value = '';
  document.getElementById('ev-desc').value = '';
  document.getElementById('ev-h').value = '';
  document.getElementById('ev-rem').value = '15';
  document.getElementById('ev-n').checked = true;
  document.getElementById('ev-d').value = fmtDate(d);
  selT('clase');
  openOv('ov-add');
  setTimeout(() => document.getElementById('ev-t').focus(), 250);
}

function selT(t) {
  selType = t;
  document.querySelectorAll('.to').forEach(el => el.classList.toggle('sel', el.dataset.t===t));
}

function saveEv() {
  const title = document.getElementById('ev-t').value.trim();
  if (!title) { toast('Ingresá un título', 'w'); return; }
  const dateStr = document.getElementById('ev-d').value;
  if (!dateStr) { toast('Seleccioná una fecha', 'w'); return; }

  const [y,m,d] = dateStr.split('-').map(Number);
  const key = K(y, m-1, d);
  const ev = {
    id: Date.now(), type: selType, title,
    time: document.getElementById('ev-h').value,
    desc: document.getElementById('ev-desc').value.trim(),
    remind: document.getElementById('ev-rem').value,
    notify: document.getElementById('ev-n').checked,
    date: dateStr
  };

  if (!events[key]) events[key] = [];
  events[key].push(ev);
  localStorage.setItem('agenda_ev', JSON.stringify(events));

  if (ev.notify && ev.remind !== '') schedRemind(ev);

  closeOv('ov-add');
  cy = y; cm = m-1;
  renderCal();
  toast(`✅ "${title}" guardado`, 'ok');
}

// ── Day Modal ──────────────────────────────────────────────────────────
function openDay(y, m, d) {
  dayDate = new Date(y, m, d);
  const key = K(y, m, d);
  const evs = events[key] || [];
  const dark = document.documentElement.dataset.theme === 'dark';

  document.getElementById('day-title').textContent =
    `${DAYS_ES[dayDate.getDay()]} ${d} ${MONTHS[m].slice(0,3)} ${y}`;

  const list = document.getElementById('day-list');
  list.innerHTML = '';

  if (evs.length === 0) {
    list.innerHTML = `<div class="empty-day">Sin eventos este día<br><span style="font-size:2rem">📅</span></div>`;
  } else {
    evs.forEach((ev, i) => {
      const col = TYPE_COL[ev.type] || TYPE_COL.clase;
      const item = document.createElement('div');
      item.className = 'edi';
      item.innerHTML = `
        <div class="edd" style="background:${dark?col[1]:col[0]}"></div>
        <div class="edif">
          <div class="edn">${ev.title}</div>
          <div class="edm">${TYPE_LBL[ev.type]}${ev.time?' · '+ev.time:''}</div>
          ${ev.desc?`<div class="edc">${ev.desc}</div>`:''}
        </div>
        <button class="del-btn" onclick="delEv('${key}',${i})">🗑</button>
      `;
      list.appendChild(item);
    });
  }
  openOv('ov-day');
}

function delEv(key, idx) {
  if (!confirm('¿Eliminar este evento?')) return;
  events[key].splice(idx, 1);
  if (!events[key].length) delete events[key];
  localStorage.setItem('agenda_ev', JSON.stringify(events));
  renderCal();
  const parts = key.split('-');
  openDay(+parts[0], +parts[1], +parts[2]);
}

function addFromDay() {
  closeOv('ov-day');
  openAdd(dayDate);
}

// ── Theme ──────────────────────────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('agenda_theme', next);
  setThemeIcon(next);
  renderCal();
  const meta = document.getElementById('meta-theme');
  meta.content = next === 'dark' ? '#0a1628' : '#c8ddf7';
}
function setThemeIcon(t) {
  const b = document.getElementById('thm-btn');
  b.innerHTML = t==='dark'
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="15" height="15" stroke-width="2.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="15" height="15" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
}

// ── Music Player ───────────────────────────────────────────────────────
function setupAudio() {
  const audio = document.getElementById('audio');
  audio.volume = 0.7;
  audio.addEventListener('playing', () => {
    isPlaying = true;
    updatePlayBtn();
    document.getElementById('p-wave').classList.remove('paused');
    document.getElementById('p-sub').innerHTML = `<div class="wave" id="p-wave"><span></span><span></span><span></span><span></span><span></span></div>`;
  });
  audio.addEventListener('pause', () => {
    isPlaying = false;
    updatePlayBtn();
    const w = document.getElementById('p-wave');
    if (w) w.classList.add('paused');
  });
  audio.addEventListener('error', () => {
    isPlaying = false;
    updatePlayBtn();
    toast('No se pudo cargar el stream. Verificá la URL.', 'err');
  });
  audio.addEventListener('waiting', () => {
    document.getElementById('p-sub').textContent = 'Cargando…';
  });
}

function togglePlayer() {
  playerOpen = !playerOpen;
  document.getElementById('player').classList.toggle('expanded', playerOpen);
}

function togglePlay() {
  const audio = document.getElementById('audio');
  if (!audio.src || audio.src === window.location.href) {
    const url = document.getElementById('stream-url').value.trim();
    if (!url) {
      if (!playerOpen) togglePlayer();
      toast('Pegá una URL de stream para reproducir', 'w');
      return;
    }
    loadUrl(true);
    return;
  }
  if (isPlaying) audio.pause();
  else audio.play().catch(() => toast('No se pudo reproducir. Revisá la URL.', 'err'));
}

function updatePlayBtn() {
  const btn = document.getElementById('play-icon');
  btn.setAttribute('viewBox', '0 0 24 24');
  if (isPlaying) {
    btn.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    btn.setAttribute('fill', 'currentColor');
    btn.setAttribute('stroke', 'none');
  } else {
    btn.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    btn.setAttribute('fill', 'currentColor');
    btn.setAttribute('stroke', 'none');
  }
}

function onUrlInput() {
  activePreset = null;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function loadUrl(autoPlay = true) {
  const url = document.getElementById('stream-url').value.trim();
  if (!url) return;
  localStorage.setItem('agenda_stream', url);
  const audio = document.getElementById('audio');
  audio.pause();
  audio.src = url;
  audio.load();
  document.getElementById('p-title').textContent = activePreset || shortUrl(url);
  if (autoPlay) {
    audio.play().catch(() => toast('No se pudo reproducir. Verificá la URL.', 'err'));
  }
}

function shortUrl(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return 'Stream'; }
}

function setVol(v) {
  document.getElementById('audio').volume = v / 100;
}

function buildPresets() {
  const wrap = document.getElementById('presets');
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.name;
    btn.onclick = () => {
      activePreset = p.name;
      document.getElementById('stream-url').value = p.url;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadUrl(true);
    };
    wrap.appendChild(btn);
  });
}

// ── Notifications ──────────────────────────────────────────────────────
function requestNotif() {
  if ('Notification' in window && Notification.permission === 'default') {
    setTimeout(() => Notification.requestPermission().then(p => {
      if (p === 'granted') toast('🔔 Notificaciones activadas', 'ok');
    }), 3000);
  }
}

function schedRemind(ev) {
  if (!ev.time || ev.remind === '') return;
  const [y,m,d] = ev.date.split('-').map(Number);
  const [h,min] = ev.time.split(':').map(Number);
  const evTime = new Date(y, m-1, d, h, min).getTime();
  const remTime = evTime - parseInt(ev.remind) * 60000;
  const delay = remTime - Date.now();
  if (delay <= 0 || delay > 7*24*3600*1000) return;

  if (swReg && swReg.active) {
    swReg.active.postMessage({
      type: 'SCHEDULE_NOTIF',
      delay,
      title: `📅 ${TYPE_LBL[ev.type]}: ${ev.title}`,
      body: ev.time ? `Hoy a las ${ev.time}${ev.desc?'\n'+ev.desc:''}` : ev.desc||'',
      tag: `agenda-${ev.id}`
    });
  } else {
    setTimeout(() => {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(`📅 ${TYPE_LBL[ev.type]}: ${ev.title}`, {
          body: ev.time ? `Hoy a las ${ev.time}` : '',
          icon: './icon.svg', tag: `agenda-${ev.id}`
        });
      }
    }, delay);
  }
}

function schedAll() {
  Object.values(events).flat().forEach(ev => { if (ev.notify) schedRemind(ev); });
}

// ── Helpers ────────────────────────────────────────────────────────────
function K(y,m,d){ return `${y}-${m}-${d}`; }
function fmtDate(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function openOv(id){ document.getElementById(id).classList.add('open'); }
function closeOv(id){ document.getElementById(id).classList.remove('open'); }

function toast(msg, type='info') {
  const c = document.getElementById('tc');
  const t = document.createElement('div');
  const map = {ok:'ts-ok',info:'ts-info',w:'ts-w',err:'ts-err'};
  t.className = `toast ${map[type]||'ts-info'}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 3000);
}

// ── Events ─────────────────────────────────────────────────────────────
document.querySelectorAll('.ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.ov.open').forEach(m => m.classList.remove('open'));
});

// ── Start ──────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
